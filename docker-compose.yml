version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai_secret
      POSTGRES_DB: healthai_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: healthai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@healthai.edu
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
